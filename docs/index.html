<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>doc-to-markdown</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f8f9fa;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    header p {
      color: #555;
      margin-top: 0.3rem;
      font-size: 0.95rem;
    }

    .container {
      width: 100%;
      max-width: 720px;
    }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed #b0b8c1;
      border-radius: 12px;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: #fff;
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: #4361ee;
      background: #eef1ff;
    }

    .drop-zone p {
      font-size: 1rem;
      color: #555;
    }

    .drop-zone .formats {
      font-size: 0.82rem;
      color: #888;
      margin-top: 0.5rem;
    }

    .drop-zone input[type="file"] {
      display: none;
    }

    /* Status bar */
    #status {
      margin-top: 1rem;
      padding: 0.6rem 1rem;
      border-radius: 8px;
      font-size: 0.88rem;
      display: none;
    }

    #status.loading {
      display: block;
      background: #e8f0fe;
      color: #1a56db;
    }

    #status.success {
      display: block;
      background: #d4edda;
      color: #155724;
    }

    #status.error {
      display: block;
      background: #f8d7da;
      color: #721c24;
    }

    #status code {
      background: rgba(0,0,0,0.06);
      padding: 0.15em 0.4em;
      border-radius: 4px;
      font-size: 0.85em;
    }

    /* Output area */
    .output-area {
      margin-top: 1.5rem;
      display: none;
    }

    .output-area.visible {
      display: block;
    }

    .output-area textarea {
      width: 100%;
      min-height: 320px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 0.85rem;
      line-height: 1.5;
      padding: 1rem;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #fff;
      color: #1a1a2e;
      resize: vertical;
    }

    .actions {
      margin-top: 0.75rem;
      display: flex;
      gap: 0.5rem;
    }

    .actions button {
      padding: 0.5rem 1.2rem;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: #fff;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    .actions button:hover {
      background: #f0f0f0;
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #1a56db;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    footer {
      margin-top: 3rem;
      font-size: 0.78rem;
      color: #999;
    }

    footer a { color: #666; }
  </style>
</head>
<body>
  <header>
    <h1>doc-to-markdown</h1>
    <p>Drop a document, get clean Markdown. Files never leave your browser.</p>
  </header>

  <div class="container">
    <div class="drop-zone" id="dropZone">
      <p>Drag &amp; drop a file here, or click to browse</p>
      <p class="formats">.docx &nbsp; .html &nbsp;&nbsp; <span style="color:#aaa">(.pdf requires CLI)</span></p>
      <input type="file" id="fileInput" accept=".docx,.html,.htm,.pdf">
    </div>

    <div id="status"></div>

    <div class="output-area" id="outputArea">
      <textarea id="output" readonly></textarea>
      <div class="actions">
        <button id="copyBtn">Copy to Clipboard</button>
        <button id="downloadBtn">Download .md</button>
        <button id="resetBtn">Convert Another</button>
      </div>
    </div>
  </div>

  <footer>
    <a href="https://github.com/stlevy53/doc-to-markdown">GitHub</a>
    &middot; CC BY-NC-SA 4.0
  </footer>

  <script src="app.js"></script>
</body>
</html>
